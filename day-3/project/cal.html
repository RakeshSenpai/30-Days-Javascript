<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cal.css">
    <title>Calculator RK</title>
</head>
<body>
    <div class="container">
        <div class="output">
            <div class="previous-operand">234</div>
            <div class="current-operand">6755</div>
        </div>

        <button data-action="ac"class="span-two">AC</button>
        <button data-action="del" >DEL</button>
        <button data-operator = '+'>÷</button>
        <button data-value = '1'>1</button>
        <button data-value = '2'>2</button>
        <button data-value = '3'>3</button>
        <button data-operator = '*'>*</button>
        <button data-value = '4'>4</button>
        <button data-value = '5'>5</button>
        <button data-value = '6'>6</button>
        <button data-operator = '+'>+</button>
        <button data-value = '7'>7</button>
        <button data-value = '8'>8</button>
        <button data-value = '9'>9</button>
        <button data-operator = '-'>-</button>
        <button data-value = '.'>.</button>
        <button data-value = '0'>0</button>
        <button data-action="equal" class="span-two">=</button>
    </div>

    
    <script src="cal.js"></script>
</body>
</html>
